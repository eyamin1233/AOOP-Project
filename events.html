<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">

<head>
    <title>Events</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

<div th:replace="fragments/bloodbank-navbar :: bloodbank-navbar"></div>

<div class="container mt-4">

    <h2 class="text-danger">
        Blood Donation Events
    </h2>

    <div class="card p-3 mb-4">

        <form th:action="@{/events/create}"
              method="post">

            <div class="form-group">
                <label>Event Name</label>
                <input type="text"
                       name="eventName"
                       class="form-control"
                       required>
            </div>

            <div class="form-group">
                <label>Date</label>
                <input type="date"
                       name="eventDate"
                       class="form-control"
                       required>
            </div>

            <div class="form-group">
                <label>Time</label>
                <input type="time"
                       name="eventTime"
                       class="form-control"
                       required>
            </div>

            <div class="form-group">
                <label>Location</label>
                <input type="text"
                       name="location"
                       class="form-control"
                       required>
            </div>

            <button class="btn btn-danger">
                Create Event
            </button>

        </form>

    </div>

    <div class="card p-3">

        <h4>Your Events</h4>

        <table class="table table-bordered">

            <thead>
            <tr>
                <th>Name</th>
                <th>Date</th>
                <th>Time</th>
                <th>Location</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="event : ${events}">

                <td th:text="${event.eventName}"></td>

                <td th:text="${event.eventDate}"></td>

                <td th:text="${event.eventTime}"></td>

                <td th:text="${event.location}"></td>

                <td>

                    <form th:action="@{/events/delete/{id}(id=${event.id})}"
                          method="post">

                        <button class="btn btn-sm btn-danger">
                            Delete
                        </button>

                    </form>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
