<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <meta charset="UTF-8">
    <title>Login - RedPulse</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <style>
        body {
            background: linear-gradient(rgba(220, 53, 69, 0.7), rgba(220, 53, 69, 0.7));
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .btn-custom {
            background: #ff416c;
            color: white;
        }

        .btn-custom:hover {
            background: #ff4b2b;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-danger fixed-top">
    <a class="navbar-brand font-weight-bold" href="/">RedPulse</a>

    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navBar">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navBar">
        <ul class="navbar-nav ml-auto">

            <li class="nav-item">
                <a class="nav-link" th:href="@{/}">Home</a>
            </li>

            <li class="nav-item active">
                <a class="nav-link" th:href="@{/login}">Sign In</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" th:href="@{/register}">Register</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" th:href="@{/admin/login}">Admin</a>
            </li>

        </ul>
    </div>
</nav>

<div class="login-box">

    <h3 class="text-center mb-4">Login</h3>

    <form th:action="@{/login}" method="post">

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" class="form-control" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-custom btn-block">
            Sign In
        </button>
    </form>

    <p class="text-center mt-3">
        Don't have an account?
        <a th:href="@{/register}">Register</a>
    </p>

</div>

</body>
</html>
