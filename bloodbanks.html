<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">

<head>
    <title>Blood Banks</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="/css/chat.css">
</head>

<body>

<!-- NAVBAR -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div id="chatBubble" onclick="toggleChat()">💬</div>

<div id="chatWidget">
    <div class="chat-header">
        RedPulse AI Chatbot
        <span onclick="toggleChat()" style="float:right;cursor:pointer;">✖</span>
    </div>

    <div id="chatBox"></div>

    <div class="chat-input">
        <input type="text" id="msg" placeholder="Ask something...">
        <button onclick="send()">Send</button>
    </div>
</div>

<div class="container mt-4">

    <h2 class="text-danger mb-4">Blood Banks Directory</h2>

    <div class="row">

        <div class="col-md-6 mb-3" th:each="b : ${banks}">

            <div class="card shadow-sm">

                <div class="card-body">

                    <h4 class="text-danger" th:text="${b.name}"></h4>

                    <p><strong>Location:</strong> <span th:text="${b.location}"></span></p>

                    <p><strong>Contact:</strong> <span th:text="${b.contact}"></span></p>

                    <p><strong>Email:</strong> <span th:text="${b.email}"></span></p>

                    <hr>

                    <h6>Available Blood Units</h6>

                    <div class="row">

                        <div class="col-6">A+</div>
                        <div class="col-6" th:text="${b.aPositive}"></div>

                        <div class="col-6">A-</div>
                        <div class="col-6" th:text="${b.aNegative}"></div>

                        <div class="col-6">B+</div>
                        <div class="col-6" th:text="${b.bPositive}"></div>

                        <div class="col-6">B-</div>
                        <div class="col-6" th:text="${b.bNegative}"></div>

                        <div class="col-6">AB+</div>
                        <div class="col-6" th:text="${b.abPositive}"></div>

                        <div class="col-6">AB-</div>
                        <div class="col-6" th:text="${b.abNegative}"></div>

                        <div class="col-6">O+</div>
                        <div class="col-6" th:text="${b.oPositive}"></div>

                        <div class="col-6">O-</div>
                        <div class="col-6" th:text="${b.oNegative}"></div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
