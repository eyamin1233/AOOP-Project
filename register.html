<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <meta charset="UTF-8">
    <title>Register - RedPulse</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <style>
        body {
            background: linear-gradient(rgba(220, 53, 69, 0.7), rgba(220, 53, 69, 0.7));
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .register-box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .btn-custom {
            background: #ff416c;
            color: white;
        }

        .btn-custom:hover {
            background: #ff4b2b;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-danger fixed-top">
    <a class="navbar-brand font-weight-bold" href="/">RedPulse</a>

    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navBar">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navBar">
        <ul class="navbar-nav ml-auto">

            <li class="nav-item">
                <a class="nav-link" th:href="@{/}">Home</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" th:href="@{/login}">Sign In</a>
            </li>

            <li class="nav-item active">
                <a class="nav-link" th:href="@{/register}">Register</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" th:href="@{/admin/login}">Admin</a>
            </li>

        </ul>
    </div>
</nav>


<div class="register-box">

    <h3 class="text-center mb-4">Register</h3>

    <form th:action="@{/register}" method="post">

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" class="form-control" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" class="form-control" required>
        </div>

        <div class="form-group">
            <label>Contact</label>
            <input type="text" name="contact" class="form-control" required>
        </div>

        <div class="form-group">
            <label>Location</label>
            <input type="text" name="location" class="form-control" required>
        </div>

        <select name="role" id="role" class="form-control mb-2" onchange="toggleBloodType()">
            <option value="DONOR">Donor</option>
            <option value="BLOOD_BANK">Blood Bank</option>
        </select>

        <script>
            function toggleBloodType() {
                let role = document.getElementById("role").value;
                let box = document.getElementById("bloodTypeBox");

                if (role === "BLOOD_BANK") {
                    box.style.display = "none";
                } else {
                    box.style.display = "block";
                }
            }
        </script>

        <div id="bloodTypeBox">
            <select name="bloodtype" class="form-control mb-2">
                <option value="">-- Select Blood Type --</option>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
            </select>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-custom btn-block">
            Create Account
        </button>

    </form>

    <p class="text-center mt-3">
        Already have an account?
        <a th:href="@{/login}">Login</a>
    </p>

</div>

</body>
</html>
