<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <title>Profile - RedPulse</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="/css/chat.css">
</head>

<body>

<!-- NAVBAR -->
<div th:replace="~{fragments/navbar :: navbar}"></div>
<script src="/js/chat.js"></script>

<div id="chatBubble" onclick="toggleChat()">💬</div>

<div id="chatWidget">

    <div class="chat-header">
        RedPulse AI Chatbot
        <span onclick="toggleChat()" style="float:right;cursor:pointer;">✖</span>
    </div>

    <!-- CHAT AREA -->
    <div id="chatBox"></div>

    <!-- SUGGESTIONS (MOVE HERE ✔ IMPORTANT) -->
    <div id="suggestions"></div>

    <!-- INPUT AREA -->
    <div class="chat-input">
        <input type="text" id="msg" placeholder="Ask something..."
               onkeyup="showSuggestions(this.value)">
        <button onclick="send()">Send</button>
    </div>

</div>

<div class="container mt-4">

    <div class="row">

        <!-- PROFILE SECTION -->
        <div class="col-md-6">

            <div class="card shadow-sm">

                <div class="card-header bg-danger text-white py-2 font-weight-bold">
                    User Profile
                </div>

                <div class="card-body">

                    <div class="form-group text-center">

                        <label>Profile Picture</label><br>

                        <img th:src="${user.profilePicture != null ? '/uploads/' + user.profilePicture : '/images/default-user.png'}"
                             style="width:120px;height:120px;border-radius:50%;object-fit:cover;border:3px solid #dc3545;"
                             class="mb-2">


                    </div>

                    <h3 class="text-danger" th:text="${user.name}"></h3>

                    <hr>

                    <p><strong>Email:</strong> <span th:text="${user.email}"></span></p>
                    <p><strong>Contact:</strong> <span th:text="${user.contact}"></span></p>
                    <p><strong>Blood Type:</strong> <span th:text="${user.bloodtype}"></span></p>
                    <p><strong>Location:</strong> <span th:text="${user.location}"></span></p>
                    <p><strong>Last Donation:</strong>
                        <span th:text="${user.lastdonationdate ?: 'Never Donated'}"></span>
                    </p>

                    <p><strong>Next Eligible Date:</strong>
                        <span th:text="${nextEligibleDate ?: 'Eligible Now'}"></span>
                    </p>

                    <a th:href="@{/profile/edit}" class="btn btn-primary btn-sm mt-2">
                        Edit Profile
                    </a>

                </div>

            </div>

        </div>


        <!-- EVENTS SECTION -->
        <div class="col-md-6">

            <div class="card shadow-sm">

                <div class="card-header bg-danger text-white py-2">
                    <h6 class="text-white mb-0 font-weight-bold">
                        Upcoming Blood Donation Events
                    </h6>
                </div>

                <div class="card-body p-2">

                    <div th:if="${#lists.isEmpty(events)}" class="text-muted p-2">
                        No upcoming events available.
                    </div>

                    <div th:each="e : ${events}" class="card mb-2 border-left-danger">

                        <div class="card-body py-2">

                            <h6 class="text-danger mb-1" th:text="${e.eventName}"></h6>

                            <small class="d-block">
                                Location: <span th:text="${e.location}"></span>
                            </small>

                            <small class="d-block">
                                Date: <span th:text="${e.eventDate}"></span>
                            </small>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <hr>

    <div class="row text-center">

        <div class="col-md-6">
            <div class="card border-danger">
                <div class="card-body">
                    <h6 class="text-muted">Total Donations</h6>
                    <h3 class="text-danger"
                        th:text="${totalDonations}">
                    </h3>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card border-warning">
                <div class="card-body">
                    <h6 class="text-muted">Reward Badge</h6>
                    <h5 class="text-warning"
                        th:text="${badge}">
                    </h5>
                </div>
            </div>
        </div>

    </div>

</div>



<style>
    .border-left-danger {
        border-left: 4px solid #dc3545;
    }
</style>

</body>
</html>
