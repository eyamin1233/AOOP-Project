<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - RedPulse</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .sidebar {
            height: 100vh;
            background: #dc3545;
            padding: 20px;
            color: white;
            position: fixed;
            width: 220px;
        }

        .sidebar a {
            color: white;
            display: block;
            padding: 10px;
            text-decoration: none;
            border-radius: 5px;
        }

        .sidebar a:hover {
            background: rgba(255,255,255,0.2);
        }

        .content {
            margin-left: 240px;
            padding: 20px;
        }

        .card-box {
            border-radius: 12px;
            padding: 20px;
            color: white;
        }

        .bg1 { background: #ff4b2b; }
        .bg2 { background: #28a745; }
        .bg3 { background: #007bff; }
        .bg4 { background: #6f42c1; }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4>RedPulse Admin</h4>
    <hr>

    <a th:href="@{/admin}">Dashboard</a>
    <a th:href="@{/admin/donors}">Donors</a>
    <a th:href="@{/admin/bloodbanks}">Blood Banks</a>
    <a th:href="@{/admin/requests}">Blood Requests</a>
    <!--<a th:href="@{/donations}">Donations</a>-->
    <a th:href="@{/logout}">Logout</a>
</div>

<!-- MAIN CONTENT -->
<div class="content">

    <h2>Admin Dashboard</h2>
    <p>Welcome to RedPulse control panel</p>

    <div class="row">

        <div class="col-md-3">
            <div class="card-box bg1">
                <h5>Total Users</h5>
                <h3 th:text="${userCount}"></h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card-box bg2">
                <h5>Blood Banks</h5>
                <h3 th:text="${bloodBankCount}"></h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card-box bg3">
                <h5>Requests</h5>
                <h3 th:text="${requestCount}"></h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card-box bg4">
                <h5>Donations</h5>
                <h3 th:text="${donationCount}"></h3>
            </div>
        </div>

    </div>

    <hr>

</div>

</body>
</html>
