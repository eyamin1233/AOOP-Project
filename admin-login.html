<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - RedPulse</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <style>
        body {
            background: linear-gradient(rgba(220, 53, 69, 0.75), rgba(220, 53, 69, 0.75));
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 360px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .btn-admin {
            background: #dc3545;
            color: white;
        }

        .btn-admin:hover {
            background: #c82333;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-danger fixed-top">
    <a class="navbar-brand font-weight-bold" href="/">RedPulse</a>

    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navBar">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navBar">
        <ul class="navbar-nav ml-auto">

            <li class="nav-item">
                <a class="nav-link" th:href="@{/}">Home</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" th:href="@{/login}">Sign In</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" th:href="@{/register}">Register</a>
            </li>

            <li class="nav-item">
                <a class="nav-link active" th:href="@{/admin}">Admin</a>
            </li>

        </ul>
    </div>
</nav>

<div class="login-box">

    <h3 class="text-center text-danger mb-4">Admin Login</h3>

    <form th:action="@{/admin/login}" method="post">

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" class="form-control" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-admin btn-block">
            Login as Admin
        </button>
    </form>

    <p class="text-center mt-3">
        <a th:href="@{/login}">Back to User Login</a>
    </p>

</div>

</body>
</html>
