<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <meta charset="UTF-8">
    <title>Admin - Blood Requests</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <style>
        body { background-color: #f8f9fa; }

        .sidebar {
            height: 100vh;
            background: #dc3545;
            padding: 20px;
            color: white;
            position: fixed;
            width: 220px;
        }

        .sidebar a {
            color: white;
            display: block;
            padding: 10px;
            text-decoration: none;
            border-radius: 5px;
        }

        .sidebar a:hover {
            background: rgba(255,255,255,0.2);
        }

        .content {
            margin-left: 240px;
            padding: 20px;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h4>RedPulse Admin</h4>
    <hr>

    <a th:href="@{/admin}">Dashboard</a>
    <a th:href="@{/admin/donors}">Donors</a>
    <a th:href="@{/admin/bloodbanks}">Blood Banks</a>
    <a th:href="@{/admin/requests}">Blood Requests</a>
    <a th:href="@{/logout}">Logout</a>
</div>

<div class="content">

    <h3 class="text-danger">Blood Requests</h3>

    <table class="table table-bordered table-striped mt-3">
        <thead class="thead-dark">
        <tr>
            <th>ID</th>
            <th>User ID</th>
            <th>Blood Type</th>
            <th>Bags</th>
            <th>Location</th>
            <th>Date</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="r : ${requests}">
            <td th:text="${r.id}"></td>
            <td th:text="${r.userId}"></td>
            <td th:text="${r.bloodType}"></td>
            <td th:text="${r.bags}"></td>
            <td th:text="${r.location}"></td>
            <td th:text="${r.requestDate}"></td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
