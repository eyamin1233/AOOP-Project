<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">

<head>
    <title>Donor List</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="/css/chat.css">
</head>

<body>
<!-- NAVBAR -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div id="chatBubble" onclick="toggleChat()">💬</div>

<div id="chatWidget">
    <div class="chat-header">
        RedPulse AI Chatbot
        <span onclick="toggleChat()" style="float:right;cursor:pointer;">✖</span>
    </div>

    <div id="chatBox"></div>

    <div class="chat-input">
        <input type="text" id="msg" placeholder="Ask something...">
        <button onclick="send()">Send</button>
    </div>
</div>


<div class="container mt-4">

    <h2>Donor List</h2>

    <!-- FILTER -->
    <form method="get" action="/donors" class="mb-3">

        <select name="bloodtype" class="form-control w-25 d-inline">
            <option value="">All</option>
            <option>A+</option>
            <option>A-</option>
            <option>B+</option>
            <option>B-</option>
            <option>AB+</option>
            <option>AB-</option>
            <option>O+</option>
            <option>O-</option>
        </select>

        <button class="btn btn-danger">Filter</button>
    </form>

    <!-- TABLE -->
    <table class="table table-bordered">

        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Contact</th>
            <th>Blood Group</th>
            <th>Eligibility</th>
        </tr>

        <tr th:each="d : ${donors}">
            <td th:text="${d.name}"></td>
            <td th:text="${d.email}"></td>
            <td th:text="${d.contact}"></td>
            <td th:text="${d.bloodtype}"></td>

            <td>
                <span th:if="${d.lastdonationdate == null}">
                    Eligible
                </span>

                <span th:if="${d.lastdonationdate != null}">
                    Not Eligible
                </span>
            </td>
        </tr>

    </table>

</div>

</body>
</html>
